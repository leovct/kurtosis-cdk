# This file is a copy/paste of .github/tests/combinations/fork12-cdk-erigon-validium.yml
# The only difference is that it does not deploy the cdk bridge ui.
deployment_stages:
  deploy_cdk_bridge_ui: false
  deploy_l2_contracts: false

args:
  # Custom images instrumented with antithesis binary.
  # Note that go images are also built with the data race detector.
  # TODO: instrument agglayer and zkevm-prover images.
  cdk_erigon_node_image: cdk-erigon:v2.61.17-antithesis
  zkevm_pool_manager_image: zkevm-pool-manager:v0.1.2-antithesis
  cdk_node_image: cdk:v0.5.2-rc2-antithesis
  zkevm_bridge_service_image: zkevm-bridge-service:v0.6.0-RC10-antithesis
  zkevm_da_image: cdk-data-availability:v0.0.11-antithesis

  # The rest of the config.
  verbosity: debug
  zkevm_contracts_image: leovct/zkevm-contracts:v9.0.0-rc.6-pp-fork.12
  zkevm_prover_image: hermeznetwork/zkevm-prover:v8.0.0-RC16-fork.12
  consensus_contract_type: cdk-validium
  sequencer_type: erigon
  additional_services:
    - tx_spammer
